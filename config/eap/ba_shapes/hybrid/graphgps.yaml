experiment:
  random_state: 42
  save_dir: "./outputs/eap_results/ba_shapes_hybrid/graphgps/"

dataset:
  name: ba_shapes
  root_dir: ./data/ba_shapes
  num_samples: 1000 #00
  counterfactual_path: "./data/ba_shapes/counterfactuals.pt"
  batch_size: 32
  transform: combined  


model:
  architecture: "graphgps" # or "graphormer"
  checkpoint_path: "./checkpoints/ba_shapes_graphdps/checkpoint_epoch_20.pt"  
  num_layers: 16      
  hidden_dim: 256      
  num_heads: 8         
  dropout: 0.1        

  num_classes: 2       
  input_dim: 10        

  pe_type: rwpe
  pe_dim: 20           
  walk_length: 16 

eap:
  strategy: "hybrid" # "classic", "minar", "hybrid"
  
optimizer:
  mode: "binary_search" # or "sweep" "binary_search"
  metric: "f1"
  max_degradation: 0.0001 # Allow max 5% drop in F1 score
  tolerance: 0.0005 # Binary search precision
  sweep_percentiles: [0.01, 0.02, 0.04, 0.045, 0.05, 0.1, 0.2] # Used if mode is 'sweep'